name: Deployment CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    env:
      NPM_CONFIG_FUND: false # Disable npm fund messages
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install dependencies and build
      - name: Install dependencies
        run: npm ci --omit=dev # Use --omit=dev for production dependencies

      - name: Build Next.js app
        run: npm run build

      # Verify build
      - name: Verify build
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found!"
            exit 1
          fi

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next/
            package.json
            package-lock.json
            public/
            next.config.js
          retention-days: 1

      # Test SSH connection
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            echo "SSH connection successful"

      # Prepare deployment directory with backup
      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            echo "Preparing deployment directory..."
            # Create directories
            sudo mkdir -p /var/www/4BlocksRoadmap
            sudo mkdir -p /var/www/4BlocksRoadmap/backups
            # Backup current deployment
            if [ -d "/var/www/4BlocksRoadmap/current" ]; then
              sudo mv /var/www/4BlocksRoadmap/current /var/www/4BlocksRoadmap/backups/backup-$(date +%Y%m%d-%H%M%S)
            fi
            # Clean up old backups (keep last 5)
            sudo find /var/www/4BlocksRoadmap/backups -type d -name "backup-*" | sort -r | tail -n +6 | sudo xargs rm -rf
            # Create new deployment directory
            sudo mkdir -p /var/www/4BlocksRoadmap/current
            # Set ownership
            sudo chown -R $USER:$USER /var/www/4BlocksRoadmap

      # Transfer files to server
      - name: Transfer files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: ./.next,./package.json,./package-lock.json,./public,./next.config.js
          target: /var/www/4BlocksRoadmap/current
          strip_components: 1
          overwrite: true

      # Deploy and start app
      - name: Deploy and start app
        uses: appleboy/ssh-action@v1.0.3
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          envs: BREVO_API_KEY
          script: |
            set -e
            echo "Deploying application..."
            # Ensure Node.js is installed (install 22.x if missing)
            if ! command -v node &> /dev/null; then
              echo "Node.js not found. Installing Node.js 22.x..."
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            node -v || true
            npm -v || true
            # Navigate to deployment directory
            cd /var/www/4BlocksRoadmap/current
            # Verify required build files exist
            if [ ! -d ".next" ]; then echo ".next folder missing on server"; ls -la; exit 1; fi
            if [ ! -f "package.json" ]; then echo "package.json missing on server"; exit 1; fi
            if [ ! -d "public" ]; then echo "public folder missing on server"; exit 1; fi
            # Write runtime environment file with secrets (from step env)
            echo "Writing .env with BREVO_API_KEY..."
            if [ -z "$BREVO_API_KEY" ]; then
              echo "BREVO_API_KEY is empty or not set in secrets" >&2
              exit 1
            fi
            printf "BREVO_API_KEY=%s\n" "$BREVO_API_KEY" | sudo tee /var/www/4BlocksRoadmap/current/.env > /dev/null
            # Restrict permissions on the .env file
            sudo chmod 600 /var/www/4BlocksRoadmap/current/.env
            # Basic sanity check without leaking secret
            echo ".env created:"; sudo ls -l /var/www/4BlocksRoadmap/current/.env
            echo "Line count (should be 1):"; sudo sh -c 'wc -l /var/www/4BlocksRoadmap/current/.env'
            # Install dependencies
            npm ci --omit=dev
            npm audit fix || true # Address vulnerabilities
            # Install PM2 if not present
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
            export PATH=$HOME/.npm-global/bin:$PATH
            # Set permissions
            sudo chown -R www-data:www-data /var/www/4BlocksRoadmap/current
            # Ensure the PM2 user can read .env (Next.js reads it on start)
            sudo chown $USER:$USER /var/www/4BlocksRoadmap/current/.env
            sudo chmod -R 755 /var/www/4BlocksRoadmap/current
            # Stop and delete existing process
            if pm2 list | grep -q 'roadmap'; then
              pm2 stop roadmap || true
              pm2 delete roadmap || true
            fi
            # Load .env into this shell so PM2 child inherits runtime env
            set -a
            . /var/www/4BlocksRoadmap/current/.env
            set +a
            # Verify runtime env is loaded (do not print the value)
            if [ -z "$BREVO_API_KEY" ]; then
              echo "Runtime env missing BREVO_API_KEY after sourcing .env" >&2
              exit 1
            fi
            # Start app
            pm2 start npm --name "roadmap" -- run start -- -p 3002
            # Verify process
            sleep 3
            if ! pm2 list | grep -q 'roadmap.*online'; then
              echo "Frontend process failed to start"
              pm2 logs roadmap --lines 10
              exit 1
            fi
            # Save PM2 configuration
            pm2 save
            pm2 startup systemd -u $USER --hp $HOME
            # Health check
            for i in {1..15}; do
              if curl -f http://localhost:3002 >/dev/null 2>&1; then
                echo "Application is responding on port 3002"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "Health check failed after 15 attempts"
                pm2 logs roadmap --lines 20
                exit 1
              fi
              echo "Waiting for application... attempt $i/15"
              sleep 2
            done
            echo "Deployment completed successfully"

      # Configure Nginx
      - name: Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            echo "Configuring Nginx..."
            # Remove conflicting configurations
            sudo rm -f /etc/nginx/sites-enabled/roadmap
            sudo rm -f /etc/nginx/sites-enabled/frontend
            sudo rm -f /etc/nginx/sites-enabled/4blocksroadmap
            sudo rm -f /etc/nginx/sites-enabled/4blocksmvp
            # Proactively remove any other enabled configs that reference our domain
            for f in /etc/nginx/sites-enabled/*; do
              if [ -f "$f" ] && grep -q "mvp-roadmap\.4blocks\.xyz" "$f" && [ "$(basename "$f")" != "roadmap" ]; then
                echo "Removing conflicting Nginx site: $f"
                sudo rm -f "$f"
              fi
            done
            echo "Enabled sites after cleanup:"
            ls -l /etc/nginx/sites-enabled || true
            # Create Nginx configuration
            sudo tee /etc/nginx/sites-available/roadmap > /dev/null <<EOF
            server {
                # Redirect HTTP → HTTPS
            server {
                listen 80;
                listen [::]:80;
                server_name mvp-roadmap.4blocks.xyz www.mvp-roadmap.4blocks.xyz;
                return 301 https://$host$request_uri;
            }

            # HTTPS Server
            server {
                listen 443 ssl;
                listen [::]:443 ssl;
                server_name mvp-roadmap.4blocks.xyz www.mvp-roadmap.4blocks.xyz;

                ssl_certificate /etc/letsencrypt/live/mvp-roadmap.4blocks.xyz/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/mvp-roadmap.4blocks.xyz/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                location / {
                    proxy_pass http://127.0.0.1:3002;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }

            }
            EOF
            # Enable site
            sudo ln -sf /etc/nginx/sites-available/roadmap /etc/nginx/sites-enabled/
            # Remove default site
            sudo rm -f /etc/nginx/sites-enabled/default
            # Test Nginx configuration
            if ! sudo nginx -t; then
              echo "Nginx configuration test failed"
              exit 1
            fi
            # Reload and enable Nginx
            sudo systemctl reload nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx
            echo "Nginx configured successfully"
