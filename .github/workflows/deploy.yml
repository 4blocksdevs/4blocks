name: Deployment CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    env:
      NPM_CONFIG_FUND: false # Disable npm fund messages
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install dependencies and build
      - name: Install dependencies
        run: npm ci --omit=dev # Use --omit=dev for production dependencies

      - name: Build Next.js app
        run: npm run build

      # Verify build
      - name: Verify build
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found!"
            exit 1
          fi

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next/
            package.json
            package-lock.json
            public/
            next.config.js
          retention-days: 1

      # Test SSH connection
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_CICD_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            echo "SSH connection successful"

      # Prepare deployment directory with backup
      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_CICD_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "Preparing deployment directory..."
            # Create directories
            sudo mkdir -p /var/www/FrontendWebApp
            sudo mkdir -p /var/www/FrontendWebApp/backups
            # Backup current deployment
            if [ -d "/var/www/FrontendWebApp/current" ]; then
              sudo mv /var/www/FrontendWebApp/current /var/www/FrontendWebApp/backups/backup-$(date +%Y%m%d-%H%M%S)
            fi
            # Clean up old backups (keep last 5)
            sudo find /var/www/FrontendWebApp/backups -type d -name "backup-*" | sort -r | tail -n +6 | sudo xargs rm -rf
            # Create new deployment directory
            sudo mkdir -p /var/www/FrontendWebApp/current
            # Set ownership
            sudo chown -R $USER:$USER /var/www/FrontendWebApp

      # Transfer files to server
      - name: Transfer files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_CICD_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: ./.next,./package.json,./package-lock.json,./public,./next.config.js
          target: /var/www/FrontendWebApp/current
          strip_components: 1
          overwrite: true

      # Deploy and start app
      - name: Deploy and start app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_CICD_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "Deploying application..."
            # Load NVM
            export NVM_DIR=$HOME/.nvm
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            # Set Node.js version
            nvm install 22.13.1
            nvm use 22.13.1
            export PATH=$NVM_DIR/versions/node/v22.13.1/bin:$PATH
            # Navigate to deployment directory
            cd /var/www/FrontendWebApp/current
            # Install dependencies
            npm ci --omit=dev
            npm audit fix || true # Address vulnerabilities
            # Install PM2 if not present
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
            export PATH=$HOME/.npm-global/bin:$PATH
            # Set permissions
            sudo chown -R www-data:www-data /var/www/FrontendWebApp/current
            sudo chmod -R 755 /var/www/FrontendWebApp/current
            # Stop and delete existing process
            if pm2 list | grep -q 'frontend'; then
              pm2 stop frontend || true
              pm2 delete frontend || true
            fi
            # Start app
            pm2 start npm --name "frontend" -- run start -- -p 3002
            # Verify process
            sleep 3
            if ! pm2 list | grep -q 'frontend.*online'; then
              echo "Frontend process failed to start"
              pm2 logs frontend --lines 10
              exit 1
            fi
            # Save PM2 configuration
            pm2 save
            pm2 startup systemd -u $USER --hp $HOME
            # Health check
            for i in {1..15}; do
              if curl -f http://localhost:3002 >/dev/null 2>&1; then
                echo "Application is responding on port 3002"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "Health check failed after 15 attempts"
                pm2 logs frontend --lines 20
                exit 1
              fi
              echo "Waiting for application... attempt $i/15"
              sleep 2
            done
            echo "Deployment completed successfully"

      # Configure Nginx
      - name: Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_CICD_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "Configuring Nginx..."
            # Remove conflicting configurations
            sudo rm -f /etc/nginx/sites-enabled/frontend
            # Create Nginx configuration
            sudo tee /etc/nginx/sites-available/frontend > /dev/null <<EOF
            server {
                listen 80;
                server_name mvp-roadmap.4blocks.xyz www.mvp-roadmap.4blocks.xyz;

                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;

                # Gzip compression
                gzip on;
                gzip_vary on;
                gzip_min_length 1000;
                gzip_proxied any;
                gzip_comp_level 6;
                gzip_types
                    text/plain
                    text/css
                    text/xml
                    text/javascript
                    application/javascript
                    application/xml+rss
                    application/json;

                # Proxy to Next.js app
                location / {
                    proxy_pass http://localhost:3002;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                }

                # Serve static files
                location /_next/static/ {
                    alias /var/www/FrontendWebApp/current/.next/static/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                # Deny hidden files
                location ~ /\. {
                    deny all;
                }
            }
            EOF
            # Enable site
            sudo ln -sf /etc/nginx/sites-available/frontend /etc/nginx/sites-enabled/
            # Remove default site
            sudo rm -f /etc/nginx/sites-enabled/default
            # Test Nginx configuration
            if ! sudo nginx -t; then
              echo "Nginx configuration test failed"
              exit 1
            fi
            # Reload and enable Nginx
            sudo systemctl reload nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx
            echo "Nginx configured successfully"
