name: Deploy 4Blocks MVP to Ubuntu Server

on:
  push:
    branches: [main]

env:
  APP_NAME: 4blocks
  APP_DIR: /var/www/4BlocksMVP/current
  DOMAIN: ${{ secrets.DOMAIN }} # Added as a secret for domain configuration
  NODE_ENV: production

jobs:
  test_and_build:
    name: 🧪 Test & Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run lint check
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: ${{ env.NODE_ENV }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            package.json
            package-lock.json
            next.config.js
            public
          retention-days: 7 # Increased retention for debugging

  deploy:
    name: 🚀 Deploy to Ubuntu Server
    needs: test_and_build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: .
          target: ${{ env.APP_DIR }}
          overwrite: true

      - name: Configure environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "🚀 Starting environment setup on $(hostname)"

            # Ensure deployment directory exists with correct permissions
            sudo mkdir -p ${{ env.APP_DIR }}
            sudo chown -R $USER:$USER ${{ env.APP_DIR }}

            # Write environment variables to .env file
            cat << EOF | sudo tee ${{ env.APP_DIR }}/.env > /dev/null
            NODE_ENV=${{ env.NODE_ENV }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            EOF

      - name: Install and start app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            # Install production dependencies
            npm ci --omit=dev

            # Install PM2 globally if not present
            if ! command -v pm2 &>/dev/null; then
              sudo npm install -g pm2
            fi

            # Start or restart app with PM2
            pm2 delete ${{ env.APP_NAME }} || true
            pm2 start "npm start" --name "${{ env.APP_NAME }}"
            pm2 save
            pm2 startup systemd -u $USER --hp $HOME

      - name: Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            NGINX_CONF="/etc/nginx/sites-available/${{ env.APP_NAME }}"

            # Write Nginx configuration
            sudo bash -c "cat > $NGINX_CONF" << 'EOF'
            server {
                listen 80;
                server_name ${{ env.DOMAIN }} www.${{ env.DOMAIN }};

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }

                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;
            }
            EOF

            # Enable and reload Nginx
            sudo ln -sf /etc/nginx/sites-available/${{ env.APP_NAME }} /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx
            sudo systemctl enable nginx

      - name: Enable SSL (Optional)
        if: ${{ secrets.ENABLE_SSL == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            sudo apt-get update
            sudo apt-get install -y certbot python3-certbot-nginx
            sudo certbot --nginx -d ${{ env.DOMAIN }} -d www.${{ env.DOMAIN }} --non-interactive --agree-tos -m ${{ secrets.ADMIN_EMAIL }}

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "🔍 Running health check..."
            sleep 5
            if curl -fs http://localhost:3000 > /dev/null; then
              echo "✅ App is running successfully on port 3000."
            else
              echo "❌ Health check failed! App not reachable."
              exit 1
            fi

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: deployments
          text: "🚨 Deployment of ${{ env.APP_NAME }} MVP failed on ${{ github.sha }}!"

      - name: Deployment Summary
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "📦 Deployment complete for ${{ env.APP_NAME }} MVP"
            echo "📍 Path: ${{ env.APP_DIR }}"
            echo "🕒 Time: $(date)"
            echo "🌐 Nginx: $(sudo systemctl is-active nginx)"
            echo "⚙️ PM2 Apps:"
            pm2 list
