name: Deploy Next.js SSR App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a modern Node.js version to avoid deprecation issues
          cache: 'npm'

      # Install dependencies and build Next.js app
      - name: Install dependencies
        run: npm ci --omit=dev # Use --omit=dev instead of deprecated --production

      - name: Build Next.js app
        run: npm run build

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next/
            package.json
            package-lock.json
            public/
            next.config.js
          retention-days: 1

      # Set up deployment directory on remote server
      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Create deployment directory if it doesn't exist
            sudo mkdir -p /var/www/4BlocksMVP
            sudo mkdir -p /var/www/4BlocksMVP/backups
            # Create backup of current deployment
            if [ -d "/var/www/4BlocksMVP/current" ]; then
              sudo mv /var/www/4BlocksMVP/current /var/www/4BlocksMVP/backups/backup-$(date +%Y%m%d-%H%M%S)
            fi
            # Clean up old backups (keep last 5)
            sudo find /var/www/4BlocksMVP/backups -type d -name "backup-*" | sort -r | tail -n +6 | sudo xargs rm -rf
            # Create new deployment directory
            sudo mkdir -p /var/www/4BlocksMVP/current
            # Set proper ownership
            sudo chown -R $USER:$USER /var/www/4BlocksMVP

      # Transfer build files to server
      - name: Transfer files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ./.next,./package.json,./package-lock.json,./public,./next.config.js
          target: /var/www/4BlocksMVP/current
          strip_components: 1 # Remove the top-level directory from the tar
          overwrite: true

      # Install dependencies and start app with PM2
      - name: Deploy and start app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Navigate to deployment directory
            cd /var/www/4BlocksMVP/current
            # Install production dependencies
            npm ci --omit=dev
            # Check for vulnerabilities and attempt to fix
            npm audit fix || true # Run audit fix, but don't fail if it can't resolve
            # Install PM2 globally if not already installed
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            # Set proper permissions
            sudo chown -R www-data:www-data /var/www/4BlocksMVP/current
            sudo chmod -R 755 /var/www/4BlocksMVP/current
            # Stop existing PM2 process if running
            pm2 delete 4blocksmvp || true
            # Start Next.js app with PM2
            pm2 start npm --name "4blocksmvp" -- run start -- -p 3000
            # Save PM2 process list
            pm2 save
            # Ensure PM2 starts on system boot
            sudo pm2 startup systemd -u ${{ secrets.SERVER_USERNAME }} --hp /home/${{ secrets.SERVER_USERNAME }}

      # Configure Nginx
      - name: Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Remove conflicting configurations
            sudo rm -f /etc/nginx/sites-enabled/mvp-roadmap
            # Create Nginx configuration
            sudo tee /etc/nginx/sites-available/4blocksmvp > /dev/null <<EOF
            server {
                listen 80;
                server_name mvp-roadmap.4blocks.xyz www.mvp-roadmap.4blocks.xyz;

                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;

                # Gzip compression
                gzip on;
                gzip_vary on;
                gzip_min_length 1000;
                gzip_proxied any;
                gzip_comp_level 6;
                gzip_types
                    text/plain
                    text/css
                    text/xml
                    text/javascript
                    application/javascript
                    application/xml+rss
                    application/json;

                # Proxy to Next.js app
                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                }

                # Serve static files directly
                location /_next/static/ {
                    alias /var/www/4BlocksMVP/current/.next/static/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                # Deny access to hidden files
                location ~ /\. {
                    deny all;
                }
            }
            EOF
            # Enable the site
            sudo ln -sf /etc/nginx/sites-available/4blocksmvp /etc/nginx/sites-enabled/
            # Remove default site if it exists
            sudo rm -f /etc/nginx/sites-enabled/default
            # Test Nginx configuration
            if ! sudo nginx -t; then
              echo "Nginx configuration test failed"
              exit 1
            fi
            # Reload Nginx
            sudo systemctl reload nginx
            # Ensure Nginx is running
            sudo systemctl enable nginx
            sudo systemctl start nginx
