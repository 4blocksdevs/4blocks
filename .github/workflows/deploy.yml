name: Deploy 4Blocks MVP to Ubuntu Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent multiple deployments from running concurrently
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test and Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a newer, stable version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true # Allow pipeline to continue if linting fails

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }} 
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next/
            package.json
            package-lock.json
            .env.production # Include if you have a production env file
          retention-days: 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Create deployment directory if it doesn't exist
            sudo mkdir -p /var/www/4BlocksMVP
            sudo mkdir -p /var/www/4BlocksMVP/backups

            # Create backup of current deployment
            if [ -d "/var/www/4BlocksMVP/current" ]; then
              sudo mv /var/www/4BlocksMVP/current /var/www/4BlocksMVP/backups/backup-$(date +%Y%m%d-%H%M%S)
            fi

            # Clean up old backups (keep last 5)
            sudo find /var/www/4BlocksMVP/backups -type d -name "backup-*" | sort -r | tail -n +6 | sudo xargs rm -rf

            # Create new deployment directory
            sudo mkdir -p /var/www/4BlocksMVP/current

            # Set proper ownership
            sudo chown -R $USER:$USER /var/www/4BlocksMVP

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".next/*,package.json,package-lock.json,public/*,.env.production"
          target: "/var/www/4BlocksMVP/current/"
          strip_components: 0

      - name: Install dependencies and configure PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Navigate to deployment directory
            cd /var/www/4BlocksMVP/current

            # Install production dependencies
            npm ci --production

            # Install PM2 globally if not already installed
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # Set proper permissions
            sudo chown -R www-data:www-data /var/www/4BlocksMVP/current
            sudo chmod -R 755 /var/www/4BlocksMVP/current

            # Stop existing PM2 process if running
            pm2 delete 4blocksmvp || true

            # Start Next.js app with PM2
            pm2 start npm --name "4blocksmvp" -- run start -- -p 3000

            # Save PM2 process list
            pm2 save

            # Ensure PM2 starts on system boot
            sudo pm2 startup systemd -u $USER --hp /home/$USER

      - name: Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Create Nginx configuration
            sudo tee /etc/nginx/sites-available/4blocksmvp > /dev/null <<EOF
            server {
                listen 80;
                server_name mvp-roadmap.4blocks.xyz www.mvp-roadmap.4blocks.xyz;

                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;

                # Gzip compression
                gzip on;
                gzip_vary on;
                gzip_min_length 1000;
                gzip_proxied any;
                gzip_comp_level 6;
                gzip_types
                    text/plain
                    text/css
                    text/xml
                    text/javascript
                    application/javascript
                    application/xml+rss
                    application/json;

                # Proxy to Next.js app
                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                }

                # Serve static files directly
                location /_next/static/ {
                    alias /var/www/4BlocksMVP/current/.next/static/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                # Deny access to hidden files
                location ~ /\. {
                    deny all;
                }
            }
            EOF

            # Enable the site
            sudo ln -sf /etc/nginx/sites-available/4blocksmvp /etc/nginx/sites-enabled/

            # Remove default site if it exists
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test Nginx configuration
            sudo nginx -t

            # Reload Nginx
            sudo systemctl reload nginx

            # Ensure Nginx is running
            sudo systemctl enable nginx
            sudo systemctl start nginx

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Wait for Nginx and Next.js to stabilize
            sleep 10

            # Perform health check with retries
            for i in {1..3}; do
              if curl -f -s http://localhost > /dev/null; then
                echo "✅ Deployment successful! Site is accessible."
                echo "📊 Deployment Statistics:"
                echo "📁 Files deployed: $(find /var/www/4BlocksMVP/current -type f | wc -l)"
                echo "💾 Total size: $(du -sh /var/www/4BlocksMVP/current | cut -f1)"
                echo "🕒 Deployment time: $(date)"
                exit 0
              else
                echo "⚠️ Health check attempt $i failed. Retrying..."
                sleep 5
              fi
            done
            echo "❌ Health check failed after 3 attempts! Site may not be accessible."
            exit 1

