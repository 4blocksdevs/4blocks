name: Deploy 4Blocks MVP to Ubuntu Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            package.json
            package-lock.json
            next.config.js
          retention-days: 1

  deploy:
    name: Deploy to Ubuntu Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "."
          target: "/var/www/4BlocksMVP/current"

      - name: Setup and Restart App on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🚀 Starting Deployment on $(hostname)"
            APP_DIR="/var/www/4BlocksMVP/current"

            # Create directory if not exists
            sudo mkdir -p $APP_DIR
            cd $APP_DIR

            # Write environment variables
            echo "NODE_ENV=production" | sudo tee $APP_DIR/.env > /dev/null
            echo "BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}" | sudo tee -a $APP_DIR/.env > /dev/null
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" | sudo tee -a $APP_DIR/.env > /dev/null

            # Ensure permissions
            sudo chown -R $USER:$USER $APP_DIR
            sudo chmod -R 755 $APP_DIR

            # Install dependencies
            npm ci --omit=dev

            # Install PM2 if not available
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # Stop existing app
            pm2 delete nextjs || true

            # Start new app
            pm2 start "npm start" --name "nextjs"
            pm2 save
            pm2 startup -u $USER --hp /home/$USER

            # Create Nginx config if missing
            if [ ! -f "/etc/nginx/sites-available/4blocksmvp" ]; then
              sudo tee /etc/nginx/sites-available/4blocksmvp > /dev/null <<EOF
              server {
                  listen 80;
                  server_name your-domain.com www.your-domain.com;  
                  # Replace with your domain
                  location / {
                      proxy_pass http://localhost:3000;
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade \$http_upgrade;
                      proxy_set_header Connection 'upgrade';
                      proxy_set_header Host \$host;
                      proxy_cache_bypass \$http_upgrade;
                  }
              }
              EOF
              sudo ln -sf /etc/nginx/sites-available/4blocksmvp /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
              sudo nginx -t && sudo systemctl restart nginx
            fi

            echo "✅ App restarted successfully!"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sleep 8
            if curl -fs http://localhost:3000 > /dev/null; then
              echo "✅ Health check passed! SSR app is running."
              echo "🌐 Visit your site at http://your-domain.com"
            else
              echo "❌ Health check failed — Next.js may not have started correctly."
              pm2 logs nextjs --lines 50
              exit 1
            fi
