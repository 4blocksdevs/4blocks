name: Deploy 4Blocks MVP to Ubuntu Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test and Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            out/
            package.json
            package-lock.json
          retention-days: 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Server
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Create deployment directory if it doesn't exist
            sudo mkdir -p /var/www/4BlocksMVP
            sudo mkdir -p /var/www/4BlocksMVP/backups

            # Create backup of current deployment
            if [ -d "/var/www/4BlocksMVP/current" ]; then
              sudo mv /var/www/4BlocksMVP/current /var/www/4BlocksMVP/backups/backup-$(date +%Y%m%d-%H%M%S)
            fi

            # Clean up old backups (keep last 5)
            sudo find /var/www/4BlocksMVP/backups -type d -name "backup-*" | sort -r | tail -n +6 | sudo xargs rm -rf

            # Create new deployment directory
            sudo mkdir -p /var/www/4BlocksMVP/current

            # Set proper ownership
            sudo chown -R $USER:$USER /var/www/4BlocksMVP



      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "*"
          target: "/var/www/4BlocksMVP/current/"
          strip_components: 0

      - name: Write BREVO_API_KEY to .env on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}" | sudo tee /var/www/4BlocksMVP/current/.env


      - name: Configure Nginx and Start Next.js with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Set proper permissions
            sudo chown -R www-data:www-data /var/www/4BlocksMVP/current
            sudo chmod -R 755 /var/www/4BlocksMVP/current

            # Create nginx configuration if it doesn't exist
            if [ ! -f "/etc/nginx/sites-available/4blocksmvp" ]; then
              sudo tee /etc/nginx/sites-available/4blocksmvp > /dev/null <<EOF
            server {
                listen 80;
                server_name your-domain.com www.your-domain.com;  # Replace with your domain
                root /var/www/4BlocksMVP/current;
                index index.html;
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                gzip on;
                gzip_vary on;
                gzip_min_length 1000;
                gzip_proxied any;
                gzip_comp_level 6;
                gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
                location /_next/static/ {
                    alias /var/www/4BlocksMVP/current/_next/static/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
                location /api/ {
                    try_files \$uri \$uri/ =404;
                }
                location / {
                    try_files $uri $uri.html $uri/ /index.html;
                }
                location ~ /\. {
                    deny all;
                }
            }
            EOF
              sudo ln -sf /etc/nginx/sites-available/4blocksmvp /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
            fi
            sudo nginx -t
            sudo systemctl reload nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx

            # Install PM2 globally if not present
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # Install dependencies and start Next.js app with PM2
            cd /var/www/4BlocksMVP/current
            npm ci
            pm2 delete nextjs || true
            pm2 start npm --name "nextjs" -- start
            pm2 save
            pm2 startup

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Wait a moment for nginx to fully reload
            sleep 5

            # Check if the site is accessible
            if curl -f -s http://localhost > /dev/null; then
              echo "✅ Deployment successful! Site is accessible."
              echo "📊 Deployment Statistics:"
              echo "📁 Files deployed: $(find /var/www/4BlocksMVP/current -type f | wc -l)"
              echo "💾 Total size: $(du -sh /var/www/4BlocksMVP/current | cut -f1)"
              echo "🕒 Deployment time: $(date)"
            else
              echo "❌ Health check failed! Site may not be accessible."
              exit 1
            fi

      - name: Notify deployment status
        uses: appleboy/ssh-action@v1.0.3
        if: always()
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🚀 4Blocks MVP Deployment Complete!"
            echo "📍 Location: /var/www/4BlocksMVP/current"
            echo "🌐 Server: $(hostname)"
            echo "⏰ Time: $(date)"
            echo "📋 Nginx Status: $(sudo systemctl is-active nginx)"
